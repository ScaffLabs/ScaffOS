version: '3.8'
services:
  portfolio-tracker:
    build: .
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - PORTFOLIO_SERVICE_URL=http://mongo:27017/portfolio-tracker
      - NODE_ENV=development
      - DATABASE_URL=mongodb://mongo:27017/portfolio-tracker
      - LOG_LEVEL=info
      - DEBUG_MODE=false
    depends_on:
      - mongo
  mongo:
    image: mongo
    ports:
      - '27017:27017' 