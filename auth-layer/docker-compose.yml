version: '3.8'
services:
  auth-layer:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - JWT_SECRET=your_jwt_secret
      - API_KEY_SECRET=your_api_key_secret
      - DATABASE_URL=your_database_url
      - USER_SERVICE_URL=http://database:5432
      - ORDER_SERVICE_URL=http://database:5432
    volumes:
      - .:/usr/src/app
    depends_on:
      - database

  database:
    image: postgres:latest
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
