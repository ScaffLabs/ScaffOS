version: '3.8'
services:
  auth-layer:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - JWT_SECRET=your_jwt_secret
      - API_KEY_SECRET=your_api_key_secret
      - DATABASE_URL=your_database_url
      - USER_SERVICE_URL=http://user-service:4000
      - ORDER_SERVICE_URL=http://order-service:5000
    volumes:
      - .:/usr/src/app
    depends_on:
      - database

  database:
    image: postgres:latest
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'

  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
    ports:
      - '4000:4000'

  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    ports:
      - '5000:5000'