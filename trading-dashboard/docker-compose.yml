version: '3.8'
services:
  trading-dashboard:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: trading_dashboard
    ports:
      - '3306:3306'
  external-service:
    build:
      context: ./external-service
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - .env
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - trading-dashboard

  # Optional service for monitoring
  monitoring:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'