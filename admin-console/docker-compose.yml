version: '3.8'
services:
  admin-console:
    build: ./admin-console
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - .:/app
  database:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: admin_console
    ports:
      - '5432:5432'