version: '3.8'
services:
  admin-console:
    build: ./admin-console
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://user:password@database:5432/admin_console
      - API_KEY=your_api_key_here
    volumes:
      - .:/app

  database:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: admin_console
    ports:
      - '5432:5432'
