version: '3.8'
services:
  price-aggregator:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - BASE_URL=https://api.example.com
      - PORT=3000
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - LOG_LEVEL=info
      - DOCKER=true
    volumes:
      - .:/usr/src/app
    networks:
      - price-aggregator-network

  db:
    build:
      context: .
      dockerfile: db.Dockerfile
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - price-aggregator-network

networks:
  price-aggregator-network:
    driver: bridge