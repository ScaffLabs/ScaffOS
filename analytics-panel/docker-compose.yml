version: '3.8'
services:
  analytics-panel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - REACT_APP_API_BASE_URL=http://localhost:3000
      - STRATEGY_SERVICE_URL=http://localhost:3001/api/health
      - DB_URL=mongodb://mongo:27017/analytics-panel
      - LOG_LEVEL=debug
    volumes:
      - .:/app

  strategy-service:
    image: strategy-service:latest
    environment:
      - NODE_ENV=development
    depends_on:
      - analytics-panel

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'

  nginx:
    image: nginx:latest
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
