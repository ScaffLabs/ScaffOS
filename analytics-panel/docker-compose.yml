version: '3.8'
services:
  analytics-panel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - REACT_APP_API_BASE_URL=http://localhost:3000
    volumes:
      - .:/app

  nginx:
    image: nginx:latest
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
