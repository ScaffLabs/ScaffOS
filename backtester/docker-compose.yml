version: '3.8'
services:
  backtester:
    build: .
    ports:
      - '3000:3000'
    environment:
      - ORDER_SERVICE_URL=http://order_service:4000
      - DATA_SERVICE_URL=http://data_service:5000
      - DATABASE_URL=sqlite://:memory:
      - LOG_LEVEL=info
      - API_KEY=your_api_key_here
      - SECRET_KEY=your_secret_key_here
  order_service:
    image: your_order_service_image
    ports:
      - '4000:4000'
  data_service:
    image: your_data_service_image
    ports:
      - '5000:5000'